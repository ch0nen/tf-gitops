name: Security scan

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  trivy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Trivy results directory
        run: mkdir -p trivy-results/fs && mkdir -p trivy-results/images

      - name: Scan filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results/fs/trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Extract and scan images from Terraform
        run: |
          images=$(grep 'name\s*=' terraform/main.tf | \
            grep -v 'container_name\|variable\|output\|resource\|provider\|gitops' | \
            grep ':\|latest' | \
            awk -F'"' '{print $2}' | \
            sed "s/\${var.nginx_version}/${{ secrets.NGINX_VERSION }}/g")

          echo "Images found: $images"
          overall_exit=0
          counter=1

          for image in $images; do
            echo "Scanning image: $image"
            trivy image \
              --severity HIGH,CRITICAL \
              --exit-code 0 \
              --format sarif \
              --output trivy-results/images/trivy-image-${counter}.sarif \
              $image

            trivy image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --format table \
              $image || overall_exit=1

            counter=$((counter + 1))
          done

          exit $overall_exit

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results/fs/
          category: "trivy-fs"

      - name: Upload Image Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results/images/
          category: "trivy-image"

